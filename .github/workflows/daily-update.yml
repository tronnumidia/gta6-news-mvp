name: Daily Update - GTA 6 News

on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run scraper
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: python scripts/scraper.py

      - name: Commit and push
        run: |
          git config user.name "wk-bot"
          git config user.email "bot@wkgames.news"
          git add data/news.json
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "Auto: atualização $(date +'%d/%m/%Y %H:%M')"
            git push
          )